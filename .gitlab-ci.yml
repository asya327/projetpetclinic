stages:
  - build
  - test
  - packaging
  - quality

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .m2/repository

build_job:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn -version
    - mvn clean compile --batch-mode -U

test_job:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn test --batch-mode

packaging_job:
  stage: packaging
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn package -DskipTests --batch-mode

quality_job:
  stage: quality
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn verify --batch-mode